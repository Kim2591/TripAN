<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>TripApp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
      
    <img th:src="@{/image/logo.png}" width="136" height="136">
    
    <h1>Trips en El Salvador</h1>

<table class="table table-dark table-striped">
    <thead>
        <tr>
            <td>id</td>
            <td>nombre</td>
            <td>Fecha Publicacion</td>
            <td>Costo</td>
            <td>Descripcion</td>
            <td>Destacado</td>
        </tr>
    </thead>

    <tbody>
        <tr th:each="trip : ${trips}">
        <td>
           <img th:src="@{/image/{img} (img=${trip.imagen})}"  width="100" height="100">
         </td>
            <td th:text="${trip.id}"></td>
            <td th:text="${trip.nomTrip}"></td>
            <td th:text="${trip.fecha}"></td>
            <td th:text="${trip.costo}"></td>
            <td th:text="${trip.descripcion}"></td>
            <td>
                <span th:text="${trip.destacado == 1 ? 'si' : 'no'}"
                      th:class="${trip.destacado == 1 ? 'badge bg-success' : 'badge bg-danger'}">
                </span>
            </td>
        </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

</body>
</html>
